<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porel AI Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a; color: #e5e7eb; height: 100vh; display: flex; flex-direction: column;
    }

    /* Header */
    .header {
      padding: 12px 20px; border-bottom: 1px solid #1e1e32;
      display: flex; align-items: center; gap: 12px; background: #12121f;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header h1 span { color: #818cf8; }
    .model-select {
      padding: 6px 12px; border-radius: 8px; border: 1px solid #2a2a3e;
      background: #1a1a2e; color: #e5e7eb; font-size: 13px; outline: none;
    }
    .model-select:focus { border-color: #6366f1; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #6b7280;
    }
    .status-dot.connected { background: #34d399; }
    .status-dot.error { background: #f87171; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .clear-btn {
      padding: 6px 12px; border-radius: 8px; border: 1px solid #2a2a3e;
      background: transparent; color: #9ca3af; font-size: 12px; cursor: pointer;
    }
    .clear-btn:hover { border-color: #6366f1; color: #e5e7eb; }

    /* Messages */
    .messages {
      flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }
    .message {
      max-width: 75%; padding: 12px 16px; border-radius: 12px;
      font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .message.user {
      align-self: flex-end; background: #6366f1; color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      align-self: flex-start; background: #1a1a2e; border: 1px solid #2a2a3e;
      border-bottom-left-radius: 4px;
    }
    .message.error {
      align-self: flex-start; background: #2d1215; border: 1px solid #5c2025;
      color: #fca5a5; border-bottom-left-radius: 4px;
    }
    .message.system {
      align-self: center; background: transparent; color: #6b7280;
      font-size: 12px; padding: 4px 12px; border: 1px dashed #2a2a3e;
    }
    .message-meta {
      font-size: 11px; color: #6b7280; margin-top: 6px; display: flex; gap: 8px;
    }
    .typing-dot { animation: blink 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

    /* Input */
    .input-area {
      padding: 16px 20px; border-top: 1px solid #1e1e32; background: #12121f;
      display: flex; gap: 10px; align-items: flex-end;
    }
    .input-wrap {
      flex: 1; position: relative;
    }
    .input-wrap textarea {
      width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #2a2a3e;
      background: #1a1a2e; color: #e5e7eb; font-size: 14px; font-family: inherit;
      resize: none; outline: none; min-height: 44px; max-height: 160px;
      line-height: 1.5; padding-right: 40px;
    }
    .input-wrap textarea:focus { border-color: #6366f1; }
    .input-wrap textarea::placeholder { color: #4b5563; }
    .send-btn {
      position: absolute; right: 8px; bottom: 8px;
      width: 32px; height: 32px; border-radius: 8px; border: none;
      background: #6366f1; color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; }
    .welcome {
      text-align: center; padding: 60px 20px; color: #6b7280;
    }
    .welcome h2 { font-size: 20px; color: #9ca3af; margin-bottom: 8px; }
    .welcome p { font-size: 14px; }
    .welcome .hint {
      margin-top: 16px; font-size: 12px; color: #4b5563;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="status-dot"></div>
    <h1><span>Porel</span> AI</h1>
    <select class="model-select" id="model-select">
      <option value="">Loading models...</option>
    </select>
    <div class="header-right">
      <button class="clear-btn" onclick="clearChat()">Clear</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>How can I help you?</h2>
      <p>Start a conversation below.</p>
      <div class="hint" id="model-hint"></div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Type a message..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="send()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </div>
  </div>

  <script>
    let chatHistory = [];
    let streaming = false;
    let abortCtrl = null;

    async function init() {
      try {
        const resp = await fetch('/api/models');
        const data = await resp.json();
        const models = data.data || [];
        const select = document.getElementById('model-select');
        if (models.length) {
          select.innerHTML = models.map(m =>
            `<option value="${m.id}">${m.id}</option>`
          ).join('');
          document.getElementById('status-dot').classList.add('connected');
          document.getElementById('model-hint').textContent =
            `Using ${models[0].group || 'provider'} model`;
        } else {
          select.innerHTML = '<option value="">No models available</option>';
          document.getElementById('status-dot').classList.add('error');
        }
      } catch (e) {
        document.getElementById('model-select').innerHTML =
          '<option value="">Failed to load models</option>';
        document.getElementById('status-dot').classList.add('error');
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 160) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    }

    function addMessage(role, content, meta) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = content;
      if (meta) {
        const metaDiv = document.createElement('div');
        metaDiv.className = 'message-meta';
        metaDiv.textContent = meta;
        div.appendChild(metaDiv);
      }
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      return div;
    }

    function addTypingIndicator() {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typing';
      div.innerHTML =
        '<span class="typing-dot">.</span>' +
        '<span class="typing-dot">.</span>' +
        '<span class="typing-dot">.</span>';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      return div;
    }

    async function send() {
      if (streaming) return;

      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;

      const model = document.getElementById('model-select').value;
      if (!model) {
        addMessage('error', 'No model selected. Please wait for models to load.');
        return;
      }

      input.value = '';
      autoResize(input);

      addMessage('user', text);
      chatHistory.push({ role: 'user', content: text });

      streaming = true;
      document.getElementById('send-btn').disabled = true;

      const typingEl = addTypingIndicator();
      const start = Date.now();

      try {
        abortCtrl = new AbortController();
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, messages: chatHistory, stream: true }),
          signal: abortCtrl.signal,
        });

        typingEl.remove();

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          const msg = err.error?.message || `Server error ${resp.status}`;
          addMessage('error', msg);
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullContent = '';

        const assistantEl = addMessage('assistant', '');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed.startsWith('data:')) continue;
            const payload = trimmed.slice(5).trim();
            if (payload === '[DONE]') continue;

            try {
              const chunk = JSON.parse(payload);
              if (chunk.error) {
                assistantEl.textContent = '';
                assistantEl.className = 'message error';
                assistantEl.textContent = chunk.error.message || chunk.error;
                break;
              }
              const token = chunk.choices?.[0]?.delta?.content;
              if (token) {
                fullContent += token;
                assistantEl.textContent = fullContent;
                document.getElementById('messages').scrollTop =
                  document.getElementById('messages').scrollHeight;
              }
            } catch {}
          }
        }

        if (fullContent) {
          chatHistory.push({ role: 'assistant', content: fullContent });
          const elapsed = ((Date.now() - start) / 1000).toFixed(1);
          const meta = document.createElement('div');
          meta.className = 'message-meta';
          meta.textContent = `${elapsed}s`;
          assistantEl.appendChild(meta);
        }
      } catch (e) {
        typingEl.remove();
        if (e.name !== 'AbortError') {
          addMessage('error', e.message);
        }
      } finally {
        streaming = false;
        abortCtrl = null;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('input').focus();
      }
    }

    function clearChat() {
      chatHistory = [];
      const container = document.getElementById('messages');
      container.innerHTML = `
        <div class="welcome" id="welcome">
          <h2>How can I help you?</h2>
          <p>Start a conversation below.</p>
          <div class="hint" id="model-hint"></div>
        </div>`;
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porel AI Chatbot</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-sunken: #fafafa;
      --bg-input: #ffffff;
      --border: #e5e5e5;
      --border-strong: #d4d4d4;
      --text: #1a1a1a;
      --text-dim: #737373;
      --text-faint: #a3a3a3;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --error: #dc2626;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --user-bubble: #f4f4f5;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    *:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ---------- Header ---------- */
    .header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-faint);
      flex-shrink: 0;
    }
    .status-dot.connected { background: #16a34a; }
    .status-dot.error { background: var(--error); }

    .model-select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-dim);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      max-width: 200px;
    }
    .model-select:hover { border-color: var(--border-strong); }
    .model-select:focus { border-color: var(--accent); color: var(--text); }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .clear-btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }
    .clear-btn:hover { border-color: var(--border-strong); color: var(--text); }

    /* ---------- Messages ---------- */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .messages::-webkit-scrollbar { width: 8px; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    .messages::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

    .message {
      max-width: 70%;
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user-bubble);
      color: var(--text);
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--bg);
      border: 1px solid var(--border);
    }

    .message.error {
      align-self: flex-start;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error);
    }

    .message.system {
      align-self: center;
      background: transparent;
      color: var(--text-faint);
      font-size: 12px;
      padding: 4px 12px;
    }

    .message-meta {
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 6px;
    }

    /* Typing indicator: three simple dots */
    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-faint);
      animation: blink 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; }
      40% { opacity: 1; }
    }

    /* ---------- Welcome ---------- */
    .welcome {
      margin: auto;
      text-align: center;
      padding: 40px 20px;
      max-width: 360px;
    }
    .welcome h2 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .welcome p {
      font-size: 13.5px;
      color: var(--text-dim);
      line-height: 1.5;
    }
    .welcome .hint {
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-faint);
    }

    /* ---------- Input ---------- */
    .input-area {
      padding: 14px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .input-wrap textarea {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.12s;
    }
    .input-wrap textarea:focus { border-color: var(--accent); }
    .input-wrap textarea::placeholder { color: var(--text-faint); }

    .send-btn {
      position: absolute;
      right: 6px;
      bottom: 6px;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .send-btn svg { width: 15px; height: 15px; }

    /* ---------- Responsive ---------- */
    @media (max-width: 640px) {
      .header { padding: 12px 16px; }
      .model-select { max-width: 130px; }
      .messages { padding: 16px; }
      .message { max-width: 86%; }
      .input-area { padding: 12px 16px 16px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="status-dot"></div>
    <h1>Porel AI</h1>
    <select class="model-select" id="model-select">
      <option value="">Loading models…</option>
    </select>
    <div class="header-right">
      <button class="clear-btn" onclick="clearChat()">Clear</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>How can I help you?</h2>
      <p>Start a conversation below.</p>
      <div class="hint" id="model-hint"></div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Type a message…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="send()" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </div>
  </div>

  <script>
    let chatHistory = [];
    let streaming = false;
    let abortCtrl = null;

    async function init() {
      try {
        const resp = await fetch('/api/models');
        const data = await resp.json();
        const models = data.data || [];
        const select = document.getElementById('model-select');
        if (models.length) {
          select.innerHTML = models.map(m =>
            `<option value="${m.id}">${m.id}</option>`
          ).join('');
          document.getElementById('status-dot').classList.add('connected');
          document.getElementById('model-hint').textContent =
            `Using ${models[0].group || 'provider'} model`;
        } else {
          select.innerHTML = '<option value="">No models available</option>';
          document.getElementById('status-dot').classList.add('error');
        }
      } catch (e) {
        document.getElementById('model-select').innerHTML =
          '<option value="">Failed to load models</option>';
        document.getElementById('status-dot').classList.add('error');
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 160) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    }

    function addMessage(role, content, meta) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = content;
      if (meta) {
        const metaDiv = document.createElement('div');
        metaDiv.className = 'message-meta';
        metaDiv.textContent = meta;
        div.appendChild(metaDiv);
      }
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      return div;
    }

    function addTypingIndicator() {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typing';
      div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      return div;
    }

    async function send() {
      if (streaming) return;

      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;

      const model = document.getElementById('model-select').value;
      if (!model) {
        addMessage('error', 'No model selected. Please wait for models to load.');
        return;
      }

      input.value = '';
      autoResize(input);

      addMessage('user', text);
      chatHistory.push({ role: 'user', content: text });

      streaming = true;
      document.getElementById('send-btn').disabled = true;

      const typingEl = addTypingIndicator();
      const start = Date.now();

      try {
        abortCtrl = new AbortController();
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, messages: chatHistory, stream: true }),
          signal: abortCtrl.signal,
        });

        typingEl.remove();

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          const msg = err.error?.message || `Server error ${resp.status}`;
          addMessage('error', msg);
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullContent = '';

        const assistantEl = addMessage('assistant', '');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed.startsWith('data:')) continue;
            const payload = trimmed.slice(5).trim();
            if (payload === '[DONE]') continue;

            try {
              const chunk = JSON.parse(payload);
              if (chunk.error) {
                assistantEl.textContent = '';
                assistantEl.className = 'message error';
                assistantEl.textContent = chunk.error.message || chunk.error;
                break;
              }
              const token = chunk.choices?.[0]?.delta?.content;
              if (token) {
                fullContent += token;
                assistantEl.textContent = fullContent;
                document.getElementById('messages').scrollTop =
                  document.getElementById('messages').scrollHeight;
              }
            } catch {}
          }
        }

        if (fullContent) {
          chatHistory.push({ role: 'assistant', content: fullContent });
          const elapsed = ((Date.now() - start) / 1000).toFixed(1);
          const meta = document.createElement('div');
          meta.className = 'message-meta';
          meta.textContent = `${elapsed}s`;
          assistantEl.appendChild(meta);
        }
      } catch (e) {
        typingEl.remove();
        if (e.name !== 'AbortError') {
          addMessage('error', e.message);
        }
      } finally {
        streaming = false;
        abortCtrl = null;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('input').focus();
      }
    }

    function clearChat() {
      chatHistory = [];
      const container = document.getElementById('messages');
      container.innerHTML = `
        <div class="welcome" id="welcome">
          <h2>How can I help you?</h2>
          <p>Start a conversation below.</p>
          <div class="hint" id="model-hint"></div>
        </div>`;
    }

    init();
  </script>
</body>
</html>
